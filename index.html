<!DOCTYPE html><html lang='ro'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Leo OS</title><style>body{margin:0;font-family:Arial;background:#0b1220;color:#fff}header{padding:18px;background:#1565c0;font-size:24px}nav{display:flex;background:#111827}nav button{flex:1;padding:14px;background:none;border:0;color:#ddd}.active{background:#1565c0!important}.page{display:none;padding:16px}.page.active{display:block}.card{background:#182235;border-radius:14px;padding:16px;margin-bottom:14px}</style></head><body><header>Leo OS</header><nav><button class='active' onclick="s('home',this)">Acasă</button><button onclick="s('plan',this)">Plan</button><button onclick="s('log',this)">Log</button></nav><div id='home' class='page active'><div class='card'><h2>S5</h2><p>Plan: 5K+strides, Long Run 7K, Z2.</p></div></div><div id='plan' class='page'><div class='card'><ul><li>S5-S7 Construcție</li><li>S8 Deload</li><li>S9-S11 Tempo</li><li>S12 Race</li></ul></div></div><div id='log' class='page'><div class='card'><p>01.06 5K 7:27<br>03.06 5K 8:37<br>05.06 5K 7:39<br>17.06 7.09K 7:29<br>19.06 6.02K 6:36<br>22.06 4.01K<br>24.06 4K<br>26.06 4.02K 6:39<br>29.06 6.05K 6:29</p></div></div><script>function s(i,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(i).classList.add('active');document.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');}</script></body></html>
